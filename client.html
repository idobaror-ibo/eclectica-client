<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בחירת שירים - ECLECTICA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Header card */
    .page-header {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .logo { width: 180px; height: auto; max-width: 100%; margin-bottom: 0.75rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1f2937; margin-bottom: 0.25rem; }
    .page-header p { color: #6b7280; font-size: 0.875rem; }

    /* Search */
    .search-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
    }
    .search-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-family: inherit;
      direction: rtl;
      transition: all 0.2s;
    }
    .search-card input:focus { outline: none; border-color: #F39C12; box-shadow: 0 0 0 3px rgba(243,156,18,0.1); }

    /* Category accordion */
    .category-block { margin-bottom: 0.75rem; }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2C5F8D;
      color: white;
      padding: 0.875rem 1.25rem;
      border-radius: 0.75rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .category-header:hover { background: #1e4a70; }
    .cat-title { font-size: 1rem; font-weight: 700; }
    .cat-meta { font-size: 0.8rem; color: #93c5fd; display: flex; align-items: center; gap: 0.5rem; }
    .cat-arrow { font-size: 0.75rem; transition: transform 0.2s; }
    .cat-arrow.open { transform: rotate(180deg); }

    .songs-list {
      background: white;
      border-radius: 0 0 0.75rem 0.75rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07);
      overflow: hidden;
      display: none;
    }
    .songs-list.open { display: grid; grid-template-columns: 1fr 1fr; }

    .song-item {
      display: flex;
      align-items: center;
      padding: 0.625rem 1rem;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: background 0.1s;
    }
    .song-item:hover { background: #f9fafb; }
    .song-item.checked { background: #FFF3E0; }

    .song-item input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      margin-left: 0.625rem;
      flex-shrink: 0;
      accent-color: #F39C12;
      cursor: pointer;
    }
    .song-name { flex: 1; font-size: 0.875rem; color: #374151; }
    .song-item.checked .song-name { font-weight: 600; color: #1f2937; }
    .star { color: #f59e0b; margin-right: 3px; font-size: 0.75rem; }

    @media (max-width: 480px) {
      .songs-list.open { grid-template-columns: 1fr; }
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 0.875rem 1rem;
      z-index: 100;
    }
    .bottom-bar-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .selected-count { flex: 1; font-size: 0.9rem; color: #6b7280; }
    .selected-count strong { color: #F39C12; font-size: 1rem; }

    .btn-submit {
      padding: 0.75rem 1.75rem;
      background: #F39C12;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-submit:disabled { background: #d1d5db; cursor: not-allowed; }
    .btn-submit:not(:disabled):hover { background: #E67E22; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* Loading */
    .loading-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 3rem;
      text-align: center;
      color: #6b7280;
    }
    .spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 4px solid #f3f4f6; border-top-color: #F39C12;
      border-radius: 50%; animation: spin 0.9s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success */
    .success-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 3rem 2rem;
      text-align: center;
      display: none;
    }
    .success-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .success-card h2 { color: #16a34a; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .success-card p { color: #6b7280; font-size: 0.9375rem; line-height: 1.6; }

    .no-results { background: white; border-radius: 1rem; padding: 2rem; text-align: center; color: #6b7280; display: none; }

    .spacer { height: 80px; }

    @media (max-width: 640px) {
      body { padding: 0.5rem; }
      .bottom-bar-inner { flex-wrap: wrap; }
      .btn-submit { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="page-header">
    <img src="https://drive.google.com/uc?export=view&id=1QWzx_YZtj9RWllFVOyMCh_CMh29bK1vV" alt="ECLECTICA" class="logo" onerror="this.style.display='none'">
    <h1>בחירת שירים לאירוע</h1>
    <p>סמנו את השירים שתרצו לשמוע באירוע שלכם</p>
  </div>

  <div id="loadingScreen" class="loading-card">
    <div><div class="spinner"></div></div>
    <div>טוען רשימת שירים...</div>
  </div>

  <div id="mainContent" style="display:none;">
    <div class="search-card">
      <input type="text" id="searchBox" placeholder="חיפוש שיר..." oninput="filterSongs()">
    </div>
    <div id="categoriesContainer"></div>
    <div id="noResults" class="no-results">לא נמצאו שירים תואמים</div>
    <div class="spacer"></div>
  </div>

  <div id="successScreen" class="success-card">
    <div class="success-icon">✅</div>
    <h2>הבחירה נשלחה בהצלחה!</h2>
    <p>קיבלנו את רשימת השירים שלכם.<br>נחזור אליכם בקרוב.</p>
  </div>

</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bottom-bar-inner">
    <div class="selected-count" id="selectedCount">לא נבחרו שירים</div>
    <div style="display:flex;flex-direction:column;align-items:stretch;">
      <button class="btn-submit" id="submitBtn" disabled onclick="submitSelection()">שלח את הבחירה</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7oh9aV26pjhLVNlMhRsymTan2VDYpdC47xQxbsmOHbcza_ghDIdLtFfpGa3xjmBgXHQ/exec';
  const SONGS_SHEET_ID = '1Rg_O_ZIoFa4uQZgUs4viuJjl6PWzzSgcFsozD0T0mWs';

  const params = new URLSearchParams(window.location.search);
  const rowNum = parseInt(params.get('event') || '0');

  let categoriesData = {};
  let selectedSongs = new Set();

  async function init() {
    if (!rowNum) {
      document.getElementById('loadingScreen').innerHTML = '<div style="color:#dc2626">קישור לא תקין — חסר מספר אירוע.</div>';
      return;
    }
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${SONGS_SHEET_ID}/export?format=csv`);
      const text = await res.text();
      parseCSV(text);
      renderCategories(null);
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    } catch (err) {
      document.getElementById('loadingScreen').innerHTML = '<div style="color:#dc2626">שגיאה בטעינת השירים. נסו לרענן.</div>';
    }
  }

  function parseCSV(text) {
    const lines = text.split('\n').slice(1);
    categoriesData = {};
    lines.forEach(line => {
      const parts = line.split(',');
      const cat = (parts[0] || '').trim().replace(/^"|"$/g, '');
      const song = (parts[1] || '').trim().replace(/^"|"$/g, '');
      const star = (parts[2] || '').includes('⭐');
      if (!cat || !song) return;
      if (!categoriesData[cat]) categoriesData[cat] = [];
      categoriesData[cat].push({ song, star });
    });
  }

  function renderCategories(filter) {
    const container = document.getElementById('categoriesContainer');
    container.innerHTML = '';
    let totalVisible = 0;

    Object.entries(categoriesData).forEach(([cat, songs]) => {
      const filtered = filter ? songs.filter(s => s.song.toLowerCase().includes(filter)) : songs;
      if (filtered.length === 0) return;
      totalVisible += filtered.length;

      const selectedInCat = filtered.filter(s => selectedSongs.has(s.song)).length;
      const isOpen = !!filter || selectedInCat > 0;

      const block = document.createElement('div');
      block.className = 'category-block';

      const arrow = document.createElement('span');
      arrow.className = 'cat-arrow' + (isOpen ? ' open' : '');
      arrow.textContent = '▼';

      const catCountSpan = document.createElement('span');
      updateCatCountSpan(catCountSpan, filtered.length, selectedInCat);

      const header = document.createElement('div');
      header.className = 'category-header';
      header.innerHTML = `<span class="cat-title">${escapeHtml(cat)}</span>`;
      const meta = document.createElement('span');
      meta.className = 'cat-meta';
      meta.appendChild(catCountSpan);
      meta.appendChild(arrow);
      header.appendChild(meta);

      const list = document.createElement('div');
      list.className = 'songs-list' + (isOpen ? ' open' : '');

      header.onclick = () => {
        const open = list.classList.toggle('open');
        arrow.classList.toggle('open', open);
      };

      filtered.forEach(({ song, star }) => {
        const checked = selectedSongs.has(song);
        const item = document.createElement('div');
        item.className = 'song-item' + (checked ? ' checked' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'song-name';
        if (star) {
          const starEl = document.createElement('span');
          starEl.className = 'star';
          starEl.textContent = '⭐';
          nameSpan.appendChild(starEl);
        }
        nameSpan.appendChild(document.createTextNode(song));

        item.appendChild(cb);
        item.appendChild(nameSpan);

        item.onclick = (e) => {
          if (e.target !== cb) cb.checked = !cb.checked;
          if (cb.checked) { selectedSongs.add(song); item.classList.add('checked'); }
          else { selectedSongs.delete(song); item.classList.remove('checked'); }
          updateCatCountSpan(catCountSpan, filtered.length, filtered.filter(s => selectedSongs.has(s.song)).length);
          updateCount();
        };

        list.appendChild(item);
      });

      block.appendChild(header);
      block.appendChild(list);
      container.appendChild(block);
    });

    document.getElementById('noResults').style.display = totalVisible === 0 ? 'block' : 'none';
    updateCount();
  }

  function updateCatCountSpan(span, total, selected) {
    span.innerHTML = selected > 0
      ? `${total} שירים &middot; <strong style="color:#fcd34d">${selected} נבחרו</strong>`
      : `${total} שירים`;
  }

  function filterSongs() {
    const q = document.getElementById('searchBox').value.toLowerCase().trim();
    renderCategories(q || null);
  }

  function updateCount() {
    const n = selectedSongs.size;
    document.getElementById('selectedCount').innerHTML = n === 0 ? 'לא נבחרו שירים' : `נבחרו <strong>${n}</strong> שירים`;
    document.getElementById('submitBtn').disabled = n === 0;
  }

  async function submitSelection() {
    const songs = Array.from(selectedSongs);
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'שולח...';
    document.getElementById('errorMsg').style.display = 'none';

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ rowNum, songs })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('bottomBar').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
      } else {
        throw new Error(data.error || 'שגיאה');
      }
    } catch (err) {
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = 'שגיאה בשליחה. נסו שוב.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'שלח את הבחירה';
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
